name: ci

on:
  push:
  pull_request:
  schedule:
    - cron: '17 5 * * *'

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./dev.db
      NEXTAUTH_SECRET: phase13-test-nextauth-secret
      CRON_SECRET: phase13-test-cron-secret
      NEXTAUTH_URL: http://localhost:3000
      BROKER_ADAPTER: mock
      NODE_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit for high/critical vulnerabilities
        run: npm audit --audit-level=high

      - name: Ensure Prisma SQLite path exists
        run: mkdir -p prisma && touch prisma/dev.db

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run unit tests
        run: npm run test:unit

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build app
        env:
          NODE_ENV: production
        run: npm run build

      - name: Run scheduled smoke scan probe
        if: github.event_name == 'schedule'
        env:
          BASE_URL: http://127.0.0.1:3000
          BROKER_ADAPTER: mock
          DISABLE_API_AUTH: 'true'
          NODE_ENV: production
          SMOKE_TRIGGER_SCAN: '1'
        run: |
          npm run db:deploy
          npm run db:seed
          npm run start > /tmp/hybridturtle-next.log 2>&1 &
          for i in {1..60}; do
            if curl -sfm 2 http://127.0.0.1:3000/api/system-status > /dev/null; then
              break
            fi
            if [ "$i" -eq 60 ]; then
              cat /tmp/hybridturtle-next.log
              exit 1
            fi
            sleep 2
          done
          timeout 25m npm run smoke